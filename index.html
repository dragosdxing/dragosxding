<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragoș DXing - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* Fundal cu poza ta si filtru intunecat */
        body {
            background: linear-gradient(rgba(5, 5, 8, 0.85), rgba(5, 5, 8, 0.95)), 
                        url('pnt.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigatia de sus (Glassmorphism) */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            flex-wrap: wrap; /* Pentru mobile */
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            height: 40px; /* Ajusteaza daca logo.png e prea mare/mic */
            width: auto;
        }

        .nav-brand {
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00ff00, #00cc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-center {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-center a {
            color: #dddddd;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .nav-center a:hover {
            color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }

        .nav-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 14px;
            font-weight: 600;
            color: #aaaaaa;
        }

        .clock {
            font-size: 18px;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .weather {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ffd93d;
        }

        /* Sectiunea Principala */
        .main-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .welcome-title {
            font-size: 36px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .welcome-subtitle {
            font-size: 16px;
            color: #aaaaaa;
            margin-bottom: 50px;
            font-weight: 400;
        }

        /* Sectiunea YouTube */
        .yt-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .yt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .yt-title {
            font-size: 20px;
            font-weight: 800;
            color: #ff0000; /* Rosu YouTube */
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .yt-btn {
            background: #ff0000;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .yt-btn:hover {
            background: #cc0000;
            box-shadow: 0 5px 15px rgba(255,0,0,0.4);
            transform: translateY(-2px);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Raport 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Responsiveness pentru mobile */
        @media (max-width: 768px) {
            .navbar { flex-direction: column; gap: 15px; text-align: center; }
            .nav-right { align-items: center; }
            .welcome-title { font-size: 28px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
            <div class="nav-brand">Dragoș DXing</div>
        </div>
        
        <div class="nav-center">
            <a href="https://dragosdxing.github.io/info-fm/" target="_blank">Info FM</a>
            <a href="https://dragosdxing.github.io/fm-map/" target="_blank">Harta Mea</a>
            <a href="https://servers.fmdx.org/" target="_blank">Servere TEF</a>
            <a href="https://www.facebook.com/groups/1165433140982652/" target="_blank">Grup Facebook</a>
            <a href="https://dragosconstantin20.blogspot.com/" target="_blank" style="color: #ff6b6b;">Vechiul Blog</a>
        </div>

        <div class="nav-right">
            <div class="clock" id="clock">00:00:00</div>
            <div class="weather" id="weather">🌤️ Se caută locația...</div>
        </div>
    </nav>

    <div class="main-container">
        <div class="welcome-title">Bine ai venit pe Hub-ul DXing</div>
        <div class="welcome-subtitle">Explorarea spectrului radio FM din România și Republica Moldova</div>

        <div class="yt-section">
            <div class="yt-header">
                <div class="yt-title">
                    ▶️ CELE MAI NOI CLIPURI
                </div>
                <a href="https://www.youtube.com/@dragosdxing?sub_confirmation=1" target="_blank" class="yt-btn">
                    Abonează-te pe YouTube
                </a>
            </div>
            
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/videoseries?list=UUvXsEhx8vJb0RvvLKwHx_1cD" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Script pentru Ceas Live ---
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ro-RO', { hour12: false });
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock(); // Rulam o data imediat

        // --- 2. Script pentru Vreme (Open-Meteo API) ---
        function getWeather() {
            const weatherEl = document.getElementById('weather');

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    try {
                        // Facem cerere catre API-ul gratuit Open-Meteo
                        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                        const data = await response.json();
                        
                        const temp = data.current_weather.temperature;
                        weatherEl.innerHTML = `🌡️ ${temp}°C (Local)`;
                    } catch (error) {
                        weatherEl.innerHTML = `❌ Eroare meteo`;
                    }
                }, function(error) {
                    // Daca utilizatorul refuza accesul la locatie
                    weatherEl.innerHTML = `📍 Locație blocată`;
                });
            } else {
                weatherEl.innerHTML = `Nu este suportat`;
            }
        }
        
        // Rulam functia de vreme
        getWeather();
    </script>

</body>
</html>
