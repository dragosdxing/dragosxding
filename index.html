<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragoș DXing - Home</title>
    
    <style>
        @font-face {
            font-family: 'CyGrotesk';
            src: url('CyGrotesk-GrandLight.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'LCDPhone';
            src: url('LCDPHONE.TTF') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background: linear-gradient(rgba(5, 5, 8, 0.85), rgba(5, 5, 8, 0.95)), 
                        url('pnt.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            font-family: 'CyGrotesk', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }

        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo { height: 40px; width: auto; }
        .nav-brand {
            font-size: 26px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00ff00, #00cc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.6));
        }

        .nav-center a {
            color: #dddddd;
            text-decoration: none;
            font-size: 15px;
            text-transform: uppercase;
            margin: 0 10px;
            transition: 0.3s;
        }
        .nav-center a:hover { color: #00ff00; }

        .nav-right { text-align: right; }
        .clock {
            font-family: 'LCDPhone', monospace;
            font-size: 28px;
            color: #00ff00;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.6);
        }
        .weather { color: #ffd93d; font-size: 14px; }

        /* Main Layout Grid */
        .main-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 2fr; /* Stânga mic, Dreapta (video) mare */
            gap: 25px;
            align-items: start;
        }

        /* Panoul din Stânga (Noul conținut) */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .status-live {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            letter-spacing: 1px;
            color: #00ff00;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #ff0000;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        .card-title {
            font-size: 18px;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #ffffff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
            color: #aaaaaa;
        }

        .stats-val { color: #00ff00; font-family: 'LCDPhone'; }

        /* YouTube Section */
        .yt-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }

        @media (max-width: 900px) {
            .hero-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
            <div class="nav-brand">Dragoș DXing</div>
        </div>
        <div class="nav-center">
            <a href="https://dragosdxing.github.io/info-fm/">Info FM</a>
            <a href="https://dragosdxing.github.io/fm-map/">FM Map</a>
            <a href="https://servers.fmdx.org/">TEF</a>
        </div>
        <div class="nav-right">
            <div class="clock" id="clock">00:00:00</div>
            <div class="weather" id="weather">Se încarcă locația...</div>
        </div>
    </nav>

    <div class="main-container">
        <div class="hero-grid">
            
            <div class="side-panel">
                <div class="info-card">
                    <div class="status-live"><span class="dot"></span> DX MONITOR ACTIVE</div>
                    <div style="font-size: 12px; color: #888; margin-top: 5px;">Scanning FM Frequencies...</div>
                </div>

                <div class="info-card">
                    <div class="card-title">Radio Signal Stats</div>
                    <div class="stats-row"><span>Propagare:</span> <span class="stats-val">NORMAL</span></div>
                    <div class="stats-row"><span>S-Meter:</span> <span class="stats-val">S9+10dB</span></div>
                    <div class="stats-row"><span>SNR:</span> <span class="stats-val">42 dB</span></div>
                    <div class="stats-row"><span>Locație DX:</span> <span id="loc-display" style="color:#ffd93d;">RO</span></div>
                </div>

                <div class="info-card">
                    <div class="card-title">Quick Links</div>
                    <a href="https://www.facebook.com/groups/1165433140982652/" style="color:#00ff00; text-decoration:none; font-size:14px;">→ Comunitatea Facebook</a><br>
                    <a href="https://dragosconstantin20.blogspot.com/" style="color:#ff6b6b; text-decoration:none; font-size:14px; margin-top:10px; display:inline-block;">→ Vechiul Blog</a>
                </div>
            </div>

            <div class="yt-section">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                    <span style="color:#ff0000; font-weight:bold;">YOUTUBE LATEST</span>
                    <a href="https://www.youtube.com/@dragosdxing" class="yt-btn" style="background:#ff0000; color:white; padding:5px 10px; border-radius:4px; text-decoration:none; font-size:12px;">SUBSCRIBE</a>
                </div>
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/sw_1-6ULZck" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>

        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ro-RO', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function getWeather() {
            const weatherEl = document.getElementById('weather');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const data = await res.json();
                    
                    const geoRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ro`);
                    const geoData = await geoRes.json();
                    
                    const oras = geoData.city || geoData.locality || "România";
                    weatherEl.innerHTML = `📍 ${oras} | 🌡️ ${data.current_weather.temperature}°C`;
                    document.getElementById('loc-display').textContent = oras.toUpperCase();
                }, () => { weatherEl.innerHTML = "Locație indisponibilă"; });
            }
        }
        getWeather();
    </script>
</body>
</html>
